services:
  newsletter:
    build: .
    container_name: newsletter-ai
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./Logo:/app/Logo:ro
      - newsletter-tmp:/app/.tmp
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 5s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      newsletter:
        condition: service_healthy

volumes:
  newsletter-tmp:
